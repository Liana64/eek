---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Build"

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Build & Test
        run: nix build --print-build-logs

      - name: Clippy
        run: nix develop --command cargo clippy --all-targets -- -D warnings

      - name: Format
        run: nix develop --command cargo fmt --check

      - name: Audit
        run: nix develop --command cargo audit

  publish:
    name: Publish Image
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Build image
        run: nix build .#image --print-build-logs

      - name: Image ref
        id: ref
        run: echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push
        run: |
          docker load < result
          docker tag eek:latest ghcr.io/${{ steps.ref.outputs.repo }}:latest
          docker tag eek:latest ghcr.io/${{ steps.ref.outputs.repo }}:${{ github.sha }}
          docker push ghcr.io/${{ steps.ref.outputs.repo }}:latest
          docker push ghcr.io/${{ steps.ref.outputs.repo }}:${{ github.sha }}
